apiVersion: 1
datasources:
  - name: Loki
    uid: loki              # stable uid so the bundled dashboard's "uid": "loki"
                           # references resolve to this datasource (otherwise
                           # Grafana auto-generates one and panels break)
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
