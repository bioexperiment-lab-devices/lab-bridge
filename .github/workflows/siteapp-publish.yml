name: Publish siteapp image

# Two ways to trigger:
#   - Manual: GitHub UI -> Actions -> Publish siteapp image -> Run workflow,
#     supplying a version like "0.1.0".
#   - Tag push: a git tag starting with "siteapp-v" (e.g. "siteapp-v0.1.0").
#     The version after "siteapp-v" becomes the image tag.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag (semver, e.g. 0.1.0)'
        required: true
        default: '0.1.0'
  push:
    tags:
      - 'siteapp-v*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            # Tag push: strip the "siteapp-v" prefix.
            version="${GITHUB_REF_NAME#siteapp-v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository_owner }}/lab-bridge-siteapp:$version" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: compose/siteapp
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tag.outputs.image }}
          provenance: false
